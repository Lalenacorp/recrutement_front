<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SNJobConnect">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00427E"/>
      <stop offset="100%" stop-color="#0066CC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C61"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>

  <!-- Briefcase / job icon -->
  <g transform="translate(14 16)">
    <rect x="0" y="8" width="36" height="24" rx="4" fill="#FFFFFF"/>
    <rect x="13" y="2" width="10" height="6" rx="2" fill="#FFFFFF"/>
    <rect x="0" y="18" width="36" height="3" fill="url(#accent)"/>
    <circle cx="18" cy="20" r="2.4" fill="#00427E"/>
  </g>

  <!-- SN dot to evoke Senegal identity -->
  <circle cx="50" cy="14" r="6" fill="url(#accent)"/>
  <text x="50" y="17" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="7" font-weight="800" fill="#FFFFFF">SN</text>
</svg>
