server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml application/xml+rss application/rss+xml image/svg+xml application/manifest+json;

    # Long cache for hashed assets (vite outputs hashed names)
    location ~* \.(?:css|js|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|webp|avif|svg)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SEO files: short cache, correct content-type
    location = /robots.txt {
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Content-Type application/xml;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /site.webmanifest {
        add_header Content-Type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Permanent redirects (SEO-safe URL renames)
    location = /etudes-canada {
        return 301 /espace-etudiant;
    }
    location = /etudes-canada/ {
        return 301 /espace-etudiant;
    }

    # SPA fallback — index.html should NEVER be aggressively cached
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
